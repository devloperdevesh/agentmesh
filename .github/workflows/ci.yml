name: Continuous Integration

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Dependencies
        run: go mod download

      - name: Verify Formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run Vet
        run: go vet ./...

      - name: Run Tests
        run: go test ./... -v

      - name: Build
        run: go build ./...
