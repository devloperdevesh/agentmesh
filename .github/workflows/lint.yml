name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  golangci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m
